body:
  text: 玉虛住山少微陳性定此一編集獨峯山長番陽吳明義仲誼校正山川仙都山古名縉雲山按道書洞天三十六所其仙都第二十九名玄都祈仙洞天周回三百里黃帝駕火龍上升處山巔有石屋世傳為洞天之門史記載縉雲本黃帝夏官之名張守節云栝州縉雲縣其所封也太平寰宇記唐置縉雲縣又以栝州為縉雲郡蓋以其地有縉雲山故也今縣在山之西二十三里圖經云唐天寶七年六月八日有綵雲起於李溪源覆繞縉雲山獨峯之頂雲中仙樂響亮鸞鶴飛舞俄聞山呼萬歲者九諸山皆應自申至亥乃息刺史苗奉倩上其事于朝敕改今名獨峯山一名仙都石謝靈運名山記云縉雲山旁有孤石屹然干雲髙二百丈三面臨水周圍一百六十丈頂有湖生蓮花有巖相近名步虛山逺而望之低於步虛迫而視之步虛居其下舊東陽記一名丹峯山昔黃帝嘗乘龍車登此山轍跡猶存自唐白樂天以下古今名賢留題有什步虛山在仙都山前正與玉虛宫相對疊嶂𠋣空群峯掩映又有小峯列如北斗名曰斗巖謝靈運名山記云中巖上有峯髙數十丈或如蓮花或如羊角古老云黃帝嘗鍊丹于此劉澄山水記云縉雲臺黃帝鍊丹之所輿地志云縉雲堂即三天于都山巔平敞有若壇墠是其地也童子峯在獨峯側其狀如筍獨峯之腰有竅若臍此峯平臍故名括蒼舊志云獨峯山旁一石峭立謂之童子峯好山在仙都山西初暘谷左宋紹興間轉運使李士舉嘗遊仙都過徐氏山居賦詩有華屋重重對好山之句由是得名後晦庵朱先生弭節于此其名益著隱真洞在步虛山巔與獨峯相對洞口巖石玲瓏宛若窗牖峻絶難躋罕有到者按郡志云唐劉隱真先生修鍊之所仙水洞在步虛山麓郡志一名鏡巖洞中有泉出自崖竇間滴于石池雖大旱不竭唐周景復先生修鍊之所名公磨崖記遊者衆金龍洞在步虛山東中有二洞相連通明開敞舊志云洞深不可測道家謂洞天即此也宋天禧四年投金龍玉簡於其中天堂洞在仙都山東雙龍洞左髙峻人跡罕到洞中石壁正面列二圓穴右者淺而左者深有龍居之旱禱必應洞旁又二石窪左者水清常溢右者水濁或縮名日月泉山後別有一洞俗呼為天堂山內築精舍扁曰清虛忘歸洞在仙都山西可坐數十人洞外有石聳出溪流之上遊者登覽盡得仙都之勝使人忘歸名忘歸臺初暘谷洞一名倪翁洞臨於練溪之上左右巖石竒怪對望獨峯郡志云谷在仙都山西初入頗隂隘少進有石室洞房虛敞可居以東向先得日故名初暘正東石壁有竅大如盤盂初暘光射室中爛然五采其外晴波萬斛有如燦金或云倪翁洞在縉雲縣東半里訛也宋嘉泰間郡人陳百朋續志云洞正屬仙都山練溪旁初暘谷中崖上有洞名三大字或云李陽氷篆今考谷中有磨崖初暘谷三楷字倪翁洞三篆字古老相傳昔有倪長官隱居于此今失其名宋乾道間郡守錢竽題仙都詩云初暘便是扶桑谷洞裏倪翁招我來則知倪翁洞即初暘谷明矣又曰雲堂洞右山中巖洞固多自來唯六洞著名雙龍洞在獨峯之東靈澤廟左盤石橫跨山澗中其下空洞通人雖大旱清流不竭宋紹興間久旱玉虛道士游先生望雲氣至其所見二巨蛇盤旋石下飲水不去遂祝之雷雨隨至合境霑足由是得名立祠祀之洞內左有隂穴橫穿而上昔嘗有人明炬而進莫窮其源至今旱禱必應時行沛澤或見雷光洞前澗水深處即古所謂游龍泓又曰龍泓洞宋人胡志通大魁王十朋俱有題詠伏虎巖在獨峯之西書院之右有小石山如虎跧伏一名駐獅巖翔鸞峯在獨峯之南回瀾𠅘左山巔有二石狀如鸞鶴展翅翔舞俗呼為丫叉巖靈龜石在獨峯之北仙都界石之旁山麓有巨石𠋣立宛若大龜昻首而上鄉人驗其燥濕以占雨暘小蓬萊在綀溪之下按郡志云在仙都之西潭心有小島上多怪石竒樹潭之南有石壁髙可百仞名公鐫歌詠于崖以記登覽之勝遊者泛舟而入恍若蓬瀛之境參政四明樓公鑰大書小蓬萊三字刋于碑以𠅘覆之今廢傍有合掌洞可容數十人石壁髙處橫列十餘穴若璣貫組名大組巖其東復聳一巖上廣下斂曰雨簔巖小赤壁在川石潭上按郡志云在仙都之東瀕溪壁立髙可千尺峰巒竒秀壁下空洞潭水𤁒湛莫測其深泛舟而遊逈出塵外遡流一舍餘亦有一嚴郡人參政何公淡書小赤壁三字磨于崖雖地異而名同故併録于此仙釋巖在小赤壁之西岸有石挺然森列于溪之許間有狀如仙人釋子之像者玉虛山地多在其側而古籍常以仙人石為界黃豂赤巖在仙都山之東麓有崖壁立橫亘數十尋巖竇谽谺色絢五彩逺望如雲錦近視若霞綃今土人立田社於巖下天師巖與赤巖對峙巖下有洞可立二十人內有隂穴直下通于溪古老云昔人值旱往元真護國天師祖廟請香火于兹致禱獲應遂建殿于洞前因名其巖厥後殿址蕩于水至今鄉人猶望洞而祀之東䝉巖在初暘谷左有石低昻竒怪聚立于深潭之濵巖下可以泛舟海上有仙山曰東䝉泰嶽之南山名東䝉此嚴之名莫詳所出或云巖正朝東太陽將暉水光互映而曰東𣋡亦取初暘之義二字未知孰是玉甑巖在初暘谷右山半有石突起如甑巖下有穴宛若竈門天將雨則巖上霧氣如炊溪流暴漲則門內有如釜沸之聲括蒼舊志云一名碧雲洞又號張公竈莫詳所由楊郎洞在𥘉暘谷後驛道之旁洞中髙下二級可容二十餘人古老相傳昔有楊郎居此以符藥濟惠於往來者後人思之立祠于中仙巖洞在好山之北仙巖市上山半有洞深曠髙明可立百餘人今市民立田社于中梯雲洞在仙都山西與雨衰巖對峙巖下空洞若磴自山根循至山腰長六十餘丈一名長𠅘其上深敞處土人嘗構屋於中近廢鼎湖即獨峯頂上湖也嘗生蓮花按唐宋以來名公題詠並以鼎湖稱之鍊金溪源出大盆山至仙都則名鍊金水中有石與獨峯之根連續一片其平如砥兩岸相望闊三十餘丈而水深僅尺許按郡志仙都之里曰鍊金里溪曰鍊金溪渡曰鍊金渡然莫考其所出據唐韋翃仙都山銘曰丹穴傍起金溪下融又唐隱真先生玄墟志曰鍊金溪畔足以濯纓則錬金之名古矣金華潭在鍊金溪下深處古老相傳鼎湖金蓮花瓣嘗飄墜于此因而得名練溪又在金華潭之下水光若練故名按郡志云在仙都之西初暘谷洞前水中有大人跡犬馬蹄痕又有石井深不可測丹井在玉虛正殿之西南隅隱真先生嘗汲以鍊丹至今泉清味甘冬溫夏寒雖旱潦不枯溢玉泉池在雙龍洞下其色玉潔放生池在玉虛宫外以瀦澗水既廣且深自昔為放生之所其一在妙庭觀前天塘在天堂洞後山頂冬夏不竭梳水瀨在小蓬萊上大溪中兩岸相接唯片石狀襇闊三十餘尋水落石出之時餘波分泒而流以渡俗呼為𧞭巖𢢜頭石在鍊金溪中以狀似而名之祠宇玉虛宫在仙都山中即玄都祈仙洞天黃帝飛升之地自唐天寶戊子以獨峯綵雲仙樂之瑞剌史苗奉倩奏聞敕封仙都山周回三百里禁樵採捕獵建黃帝祠宇歲度道士七人以奉香火宋治平乙巳改賜今名宣和庚子毀于寇道士游大成乃即舊基再謀營造時宫東坐西向隂陽者流謂虎瞰而角法宜改為景定庚申郡守安劉取朝㫖命道士陳觀定遷宫地向不朞年而告成元延祐庚申道士趙嗣祺欽受宣命佩服頒降處州路仙都山玉虛宫提㸃所五品印章主領宫事再奉璽書護持改復甲乙及䝉集賢院暨天師正一教主大真人特進上𡖖玄教大宗師各給榜據俾永遵守由是宫門增重舊觀本宫殿宇開列于左金闕寥陽寶殿郡人葉嗣昌書額黃帝祠宇唐縉雲縣令李陽氷篆額飛天法輪藏殿宋朝乾道己卯道士李伯祥創立法輪規模宏美郡人陳沂書扁天一真慶行宫三元三官聖堂梓潼帝君行祠洞天仙官祠玉虛真官祠衍教堂郡人何稱書扁隱真堂韓永錫書扁吳俊嘗留題今奉鍾吕諸仙像方丈扁曰天開圖畫文公五代孫朱煃九歲書風雨堂吳興趙孟俯書扁金蓮館蜀郡虞集書扁玉虛宫門東陽趙霆篆額祈仙洞天門邑人潜說友篆額仙都山門趙孟俯書額片雲𠅘取樂天片雲孤石之詠為名回瀾𠅘在金華潭上郡人何宗姚書扁仙都蛻軒競秀軒擷芳軒練玉軒駐鶴𠅘在洞天門外照水𠅘在放生池上忘歸𠅘在忘歸洞前妙庭觀在仙都山東金龍洞上唐咸通元年隱真劉先生所建又築玄墟於其後乾符三年門人朱惠思詣闕請觀額䝉錫以仙都之號景福元年江東羅隱作記宋治平二年改賜今名元皇慶元年玄妙保真道士陳懷玉欽奉璽書復為甲乙世襲香火由是振興獨峯書院在鍊金溪西正對獨峯宋淳熙壬寅晦庵朱先生持常平節上疏劾台守未報徜徉于此山以伺朝㫖有於此藏修為宜之語紹定戊子郡人開國葉公嗣昌始就此創禮殿為講貫之所咸淳丁卯邑人尚書潜公說友即舊址而廣大之基址並係玉虛山也靈澤廟在雙龍洞前即雙龍之靈郡志云宋咸淳七年知縣陳紹若禱雨有感保奏敕賜廟額至今士民祈雨輒應古廟甚隘恆定新之趙侯廟在仙都山西梯雲洞側按郡志廟在仙都鄉一方咸敬奉之侯乃後漢趙炳也廟前有石如船郡志云石有如舟者俗呼為趙侯船或如杖如履如罋皆以侯名按東漢方術傳趙炳字公阿東陽人能為越方貴尚清儉祀神以東流水為酌削桑皮為脯療病皆除東入章安今台州也百姓神服既殁遂立祠焉至今蚊蚋不入又傳注曰炳故祠在婺州永康縣東俗呼為趙侯祠江南猶傳趙侯禁法以療疾云今正一宗壇給趙侯禁氣籙即此所謂趙侯禁師者是而曆家亦有趙侯化日又按東陽志永康縣烏傷侯廟乃後漢趙炳也事與史同縣經云仕漢至大將軍廟無碑碣可考但有古𨽻書烏傷侯廟數字又郡志青田縣靈康行祠即縉雲縣趙侯廟也初侯廟食于台州臨海縣白鶴山宋元豐七年賜額積封靈順顯佑廣惠威烈王今按縉雲沿革唐聖曆元年折括蒼縣今麗水也及永康縣地置縉雲縣此廟至永康界𦆵半舍考之此地實永康故地神之顯靈無所不在雖鄰邑皆有祠無如此廟有石像可表至今廟中無蚊蚋境內不生蛭蝚水旱疾疫禱之必應豈非祖廟耶神仙景復周先生仙都道士也唐大曆間居仙水洞中辟穀宴坐百有餘年後仙去今玉虛宫有石刻陸龜䝉題鏡巖周尊師所居詩并序可考今録之處州仙都山山之半有洞下望之如鑑目之曰鏡巖去地二百尺上者以竹梯為級中如方丈內有乳水滴𤁋黃老徒周君景復居焉逮八十年不食乎栗日唯焚降真香一炷讀靈寶度人經而已東牟假公柯昔為州之日聞其名梯室以造之且曰君居此久矣乳水之滴晝夜可知量乎周君曰某常揣之盡晝與夜乃一斛加半焉公異而禮之後柯别十三年處人過說周君尚存吟想其道無由以覩因寄題詩云見說身輕鶴不如石房無侣共雲居清晨自削靈香柿獨夜空吟碧落書十洞飛精應遍吸一莖秋髮未曽梳知君便入懸珠會早晚東騎白鯉魚著作郎皮日休和詩云八十餘年住鏡巖鹿皮巾下雪髟髟床寒不奈雲縈枕經潤何妨乳滴函飲澗猿回窺絶洞緣梯人歇𠋣危杉如何計吏窮於鳥欲望仙都舉一帆括蒼舊集所載與石刻同隱真劉先生名處靜字道游沛國彭城人其先避地遂昌因家焉世宗儒業先生幼而穎悟博覽群書遊涉名山得遇至人授以吐蚋之道嘗召見賜緋衣退居仙都山隱真巖結廬金龍洞側今妙庭觀也弟子數百人有自遠方來謁者無虛日門人欲塑其像一日有嗜酒道人來成之先生留飲旬日以黃金三十銖贈其行相送金龍洞前約先生曰子歸首視硯下及回乃得片紙書云子與吾金吾授子真真抱子形形全子神十六字褁元金在焉於是頓悟遂預築玄墟于廬後自撰其志咸通十四年六月辛酉解化當日歸封玄墟剌史盧䖍瓘贊其像曰至靈之精大道之淵其朴靡散其神則全嗟夫世人嗜欲馳役故使元胎莫留瞬息惟師恬泊萬慮泯泯豈有一物能奸至真伊厥形氣尚資蛻捨胡為神人土偶為者後數年有鄉人於襄漢間見之語其弟子啓墓視之所存惟杖履二事蓋尸解也今空墓在妙庭觀後復有塑像贊云返一無迹神之又神遺此塑像非先生真先生之真不存此身出有入無莫與之親事跡出郡志贊頌出括蒼舊志仙都志卷上
