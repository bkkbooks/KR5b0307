front:
  text: 仙都志卷下鞠五
  hash: sha256:5c8bc3821efb417d5f1d78ebf8f2207bbd312e3494fd21462bf2de15e24b8771
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0307_HFL_002-001a, image: hfl/0331/0331-164.png}
body:
  text: 玉虛住山少微陳性定此一編集獨峯山長番陽吳明義仲誼校正髙士仙都乃祈仙洞天髙尚之士代所不乏自宋宣和以前玉虚厄於㓂固不可考厥後若游大成等往往闡揚宗教増重山門盛徳清名用叙其要游大成樂成人宫因㓂燬獨力重完克紹前猷發明後學尤精地理之術自卜壽蔵於仙都之支山誓曰吾家猶子枝孫世世紹聾當爲天人師後果符是言傳之八世至宋末墳為土寓所侵而游氏殆絶焉樓大度黄見素皆邑人丕扇真風廣彰玄教李伯祥劎川人道風髙古増建飛天法輪甲於浙左劉延用少微人奏免浮稅武若沖同門友表樹玄勲洪端本號髙溪葉葆和號竹澗詹虚一號寄庵陳觀定號楚山皆麗水人四世師弟子也襲大道之正傳皆玄門之領袖楚山君改易宫向勲蹟尤多林天任號横舟昆陽人昔授修職郎際陵谷變遷歸心玄學遂採摭道典黼黻教科屢闡黄籙大齋嘗於施鍊之夕顯大神光烜赫九色亘天徹地民具爾瞻謝天與號蘭谷金華人精崇道法弘賛宗乗如禱雨祈晴興雷伐廟不動聲色如響斯答人到于今稱焉徐元瑨號梓林麗水人爲玉虚道士宋景定間應詔祈雪用粉筆書青紙爲五出者以進曰翼日辰時必雪皆五出及期果然賜號紫微惠濟先生事具郡志元以好人召天師尊其道俾領玉虚以養夀大徳甲辰無疾羽化留偈曰本是蓬萊仙子住世七十九年笑指鼎湖歸去洞觀無碍蒼天趙嗣祺字虚一龍泉人幼學道玉虚既壯遍遊名山再参南谷杜真人觀光上國名公鉅𡖖無不敬愛欽受宣命賜印視五品甲乙住持實始于此又數欽捧御香馳驛淮蜀荆襄江浙湖廣閩海思播等處後住集慶大元興永夀宫湖州計籌山昇元觀平江白鶴觀累奉綸音錫號玄明通道虚一先生教門真士至元後庚辰冬解化于白鶴藏劔履于計籌李徳寧字守一括城人嘗判三衢道教主貳玉虚四十餘年興廢補弊為己任至元庚寅免税之功九著至正乙酉正月乙未忽索禇筆書偈云抱徳而寧守一而成天空月明逍遥上清書已擲筆而化草木金蓮花按郡志仙都山孤石撑空石頂有湖生蓮花古老相傳嘗有金蓮花瓣飄落龍鬚草産子獨峯崖上舊志云黄帝駕龍上昇群臣攀龍髯而上髯墜化爲草壽松古栢生于獨峯之頂木皆合抱四時長青可見獨峯有鼎湖之潤深也草木可藥者往往見山翁野叟採取形殊味别莫識其名今按本草載所有者雖非土産亦不廣生姑列其品目于後以表名山之嘉秀云黄精菖蒲菊花天門冬麥門冬車前子地黄牛膝薯蕷薏苡仁巴㦸天栝樓根石斛菴䕡卷栢草龍膽旋覆花草决明芎藭青嵩絡石茵蔯蒿石香葇紫金藤藍實景天葛根石龍蒭仙靈皮葳靈仙苦参當歸通草常山何首烏忍冬藤芍藥瞿麥狗脊山豆根牽牛子蘹香子百合茅根草薢箆麻子金星草天南星仙茅菝揳艾葉馬兜鈴馬啼香劉寄奴半夏大青剪草莎草根榖精草骨碎補王瓜射干白歛續隨子雞冠子覆盆子商陸狶簽鶴𧒢萱草根夏枯草葈耳實馬勃澤蘭茵芋紫河車五味子白术大汗王不留行防己杜藜盧羊蹄大小薊根細辛鬼舊水萍香薷紫蘇鬼箭羽薄苛木蓼馬芹淡竹葉馬齒莧冬葵子沙參紫葛蒴藋燈心草三白草牛勞子苧根菰根蓍草甘蕉根馬鞭草地膚子杜𦴈白蒿桔梗蛇苺旱蓮草草鳥頭松脂楓脂栢實五加皮地骨皮桒白皮楮實槐實橡實五陪子枸杞子郁李仁烏藥黄蘗茱茰山茱茰金櫻子金鈴子木槿皂荚苦榛苦練子花蔓荆子石楠釣藤梔子烏桕木擇木皮水楊葉秦椒乾漆杉材稻米粟白扁豆赤豆緑豆大麥小麥白油麻甖子粟梨棗藕實雞頭石榴皮栗楔桃仁梅實柿帶藤梨枇杷葉葱實白苣苦蕒水芹鳥芋苜蓿菘芥蒜韭薺碑碣并題詠黄帝祠宇石刻四大字唐縉雲令李陽水篆碑石元在玉虚宫後為縣人輦置邑庠慶磿間於碑隂刋屯雖瞻所撰學記今石尚存焉唐韋翃撰仙都山銘潜說友篆潜前宋人唐刺史李季貞撰仙都山銘趙必愿篆趙前宋人唐陸龜䝉題鏡巖周尊師所居詩并序宋治平二年改賜玉虛宫救黄及省劄部符刻石錢塘呉說陪郡守劉大中遊仙都記通判丁宗旦題仙都山玉虚宫詩郡守謝伋和運使李士舉詩郡人項鶚撰玉虚宫免稅役記太學尚書鄒景初遊玉虚宫詩并跋太常寺簿呉大韶贈知宫詹虛一詩杜晦之遊仙都記郡守趙必愿遊仙都記郡守安劉判申請改宫向狀邑人潜説友撰重建玉虛宫記邑令呉祖文題獨峯詩仙居陳仁玉遊仙都詩弟邑令紹若跋巳上錢塘具說至邑令紹若俱宋時人元縉雲縣尹石谷謝雷使徐元瑨祈雨詩元璽書大護持玉虚宫復甲乙正副全文刻石已上並在玉虛宫隠真劉先生玄墟碑志元壐書護持妙庭觀復甲乙正副全文刻石已上在妙庭觀轉運使葉清臣撰獨峯山銘磨崖于峯下慶暦間運使馬尋皇祐間運使蘇公舜元元豐間少保趙清獻公抃及前後名公四十餘人各記遊山歳月並磨崖于仙水洞中慶暦間邑尉毛維瞻陪轉運使留瑜遊仙都記磨崖于步虚山麓嘉祐間㑹稽沈紳宣和間開封劉公長𡖖紹興間錢塘虞公似平及前後名公二十餘人各記遊山歳月並磨崖于初晹谷中紹興間郭契敷蒋善昭趙善詩楊景奉詔詣仙都祈雨記磨崖于鏡巖嘉定間留元剛郭磊𡖖等遊仙都記磨崖于初晹谷外石壁上小蓬萊三字四明樓輪書立碑在山中邑人黄邦彦題獨峯詩磨崖于童子峯邑令王埴小蓬萊歌磨崖于石壁已上轉運副使葉清臣至邑令王埴俱宋時人仙水巖三楷字磨崖于洞中初晹谷三大楷字磨崖于谷中倪翁洞三大篆字或云李陽氷書磨崖于洞前隱真洞三篆字金龍洞三篆字天堂洞三𨽻字忘歸洞三楷字並磨崖于其洞右山中碑碣磨崖名目已見于前今摘其銘記略存于後所有古今名公題詠詩集另刋都山銘唐韋翃撰𠅘𠅘仙都峻極維嵩屹立溟右削成淅東發地直方磨霄穹崇靈沼在上祥雲積中圭埴千仭柱寧四封目視不及翰飛靡窮群𢍂奔走列仙會同黄帝彼訪碧嶺是冲丹穴傍起金溪下融日照霞附月映綃䝉壤絶棲塵木無寓叢居幽不昧守一而雄萬夀報響九成來空嘉名來復展禮斯洪籙作懲止年祈感通莫髙匪兹造物之功玄混播形厚載孕靈雄冠群山孤髙𠅘𠅘挺立參天氳氳青㝠嵐凝丹穴霞駁雲屏上磨九霄旁礙五星龍髯莫覩鳯管時聽降自穆武求之靡寧徒聞荒政曽不延齡物有殊異昔人乃銘爰勒斯文縉雲之坰張鷺撰仙都有山山出萬山直上千尋煙霞深圓如笋抽髙突雲隂標表下國權輿象帝日歟月歟萬有千歳東西大鎮川澤四衛造化無垠莫知徃制晴嵐依依宿霧洞開髣髴有像神仙下來灝氣氲氲靈鳥環廻永殊塵雜不鼓纎埃絶頂霄崿澄湖在上人罕戾止孰闚其狀日燭雲披風飄液飛如雨雨空微灑霑衣谷來松音潭影曙暉往往鶴唳不知所歸唐垂百年玄宗體元響應萬歳聲聞上天帝祚明德祠堂在焉永懷軒后功成此地丹竈猶存龍昇萬里事列方誌道髙青史無復仙容空流溪水百越之内此山爲大恍若壷中疑生象外直而不𠋣髙而不殆古往今來獨立滄海宋轉運副使葉清臣撰黄帝車轍馬跡周遍萬國丹成雲起因瑞名山則獨峯之登固宜有是㑹將漕二浙行部括蒼道士仙都親訪靈跡慨然感秦漢之不自度也駐馬溪上勒銘山隂於黄顯思道崇帝先隆三邁五功豐德全脫履厭世乗雲上天𥾝彼飛龍格于皇天虐秦侈漢鏖兵事邊流痡刻下溺祚窮年忘是古訓䟦于巖巔宜爾靈仙孤風巋然題詠中書舍人白居易樂天黃帝旌幢去不回片雲孤石獨崔嵬有時風激鼎湖浪散作晴天雨㸃來前進士徐凝天地茫茫成古今仙都凡有幾人尋到來唯見山髙下只是不知湖淺深運使起居舍人曹唐二首蟠桃花老華陽東軒后登真謝六宫旌節暗迎歸碧落笙歌遥聽隔崆峒衣冠留葬橋山月劔履將隨浪海風看却龍髯攀不得紅霞零落鼎湖空黄帝登真處青青不記年孤峯疑礙日一柱獨擎天石恠長棲鶴雲閑若有仙鼎湖看不見零落數枝蓮江湖散人陸龜䝉魯望題鏡岩周尊師所居見說身輕鶴不如石房無侣共雲居清晨自削靈香柿獨夜空吟碧落書十洞飛精應遍吸一莖秋髪未曽梳知君便入懸珠會早晚來騎白鯉魚序載仙都志中鏡岩即仙水洞太常博士皮日体襲美和八十餘年住鏡岩鹿皮巾下雪髟髟床寒不奈雲縈枕經潤何妨乳滴函飲磵猿回窺絶洞縁梯人歇𠋣危杉如何計吏窮於鳥欲望仙都舉一㠶两浙轉運副使李建中岩岩仙都山肅肅黄帝宫巨石臨廣澤千仭凌髙穹肇當融結初全得造化功深可蟠厚壤峭疑截㝠鴻雲軿去路存丹鼎遺迹空抽潤草心碧敷香蓮葉紅升龍扳矯矯飛鳯鳴噰噰而我集仙署嘗比瀛洲雄星移婺女間風駕析木東到覺毛骨爽坐如羽翼沖萬事皆氛埃一氣歸鴻濛遐哉上聖道邈與玄化同金簡莫至誠玉書銘代工功成解冠劔棲息期此中郡倅粱鼎黄帝升天石髙名壯斗牛孤根斜照水寒色不知秋藐與群峯並圎如一笋抽暁妨殘月下晴碍落星流危定勝崑閬登應見沃洲愛深無盡處日極更遲留起居舍人轉運使孫何三首貝闕琳宫紫霧深鳳凰仙樂尚愔愔鼎湖往事三千載石筍青春一萬尋挺立不教凡草長削成應免俗塵侵霓旌絳節知何處空有蓮花送好音薜荔無因掛一毫化工鐫削亦應勞圭形直指明河落桂影遥分漲海濤發地五千何足貴去天三百未爲髙軒轅轍迹今猶在斗上丹梯著羽袍黄帝升天去不還空留片石在人間千尋杳杳撑紅日萬古峩峩岀衆山濕霧好花宫女困𠋣雲喬木羽林閑時人不信飛昇路轍跡龍髯竟可攀刺史王含章三年爲郡仰靈蹤咫尺無因到此中長是徘徊看圖畫果然崷崪在虚空雲歸湖頂鹿難染鶴立松梢路莫通春過碧溪人翫少古壇牢落雨濛濛郡人太常丞周啓明昭回二首鼎湖深幾許斗立向空牢霹靂削不得芙蓉生更髙飛昇須駕鶴負荷欲憑鼇千仭何當繼我曹崒𡵉撑天一柱雄遥看髙與步虚同待登絶隴觀華頂又見巍巍峻揷空太常博士直史館知郡曽會二首時常展畫圖今喜到仙都盡得煙霞景方知手筆麤擎天成一柱鎮地出三吳苔片封車轍蓮香泛鼎湖占風來海國迎日上雲衢似筍千尋直如藍四面舖秀能通造化髙豈碍摶扶雷雨生岩竇星辰遶藥爐金華慚叱石玉女望投壷觀古壇尤在碑荒字半無未曽迷阮肇何倦醉麻姑塵外標名異空中立影孤笑秦銘泰嶽嫌舜葬蒼梧夏月風長滿秋霜草不枯歩虚吟羽客滴翠濕樵夫獨稱瀛洲侣吟看典郡符瀛洲風月十年餘東出雲堂典郡符更到煙霞最深處分明景物是仙都郡守陳若拙發地便擎天根盤數畒煙化工成突兀轍迹似雕鐫峭㧞殊無𠋣孤髙衆莫肩軒轅從此去知復幾千年著作佐郎兩浙運使柳紳獨出諸峯表周圍一丈圓千尋雄鎮地萬仭上擎天湖浪動星際荷花生日邊終當駕雲鶴絶頂會神仙胡志道仙都古洞天雲闕髙嵲嵲新宫欣然成碧瓦燦鱗列我時宿房六月失煩熱松聲起中夜夣枕忽驚轍天籟鳴虚徐玉簫逓泠徹鳳歌諧律吕鶴舞想應節安知非群仙宴罷揺珮玦從來箏笛耳一洗萬想滅已上夜宿仙都聞松聲間仲音韻琅琅飘然若鏗鏘環珮早起識之李侯神仙才宇宙在其手古篆誇雄竒鐵柱貫金鈕標榜黄帝祠宇書氣渾厚想當落筆時雲夣吞八九毎傳風雨夜蜿蜿龍蛇走光怪發岩竇草木潤不朽鬼物煩撝訶一旦忽失守隨煙遽飛騰無復世間有因訪山中人石刻尚仍舊誰能一新之易若運諸肘右黄帝祠宇李陽永篆休說神仙事眇茫出游塵世且和光誰知今日真棲地便是他年羽化郷朝罷玉壇雲滿袖夣回金闕月侵廊兹游似覺青㝠上隱隱微聞詠洞章右隠真堂黄帝乗雲至帝郷空留轍迹鎖穹蒼茫茫丹鼎知何在曵曵霓旌不可望乞得溪山增氣象真成草木被恩光我來睇目憑欄久是可無情憶楚襄右望雪閣百年日月馬上過贏得閑中可理生絳闕清都非渺漠寸田尺宅得經營黙存長使三宫在急守須防五嶽傾他日功成定仙去願隨風馭到蓬瀛右可理室幾年困塵鞿厥狀浸成俗比來夣䰟清勝賞得林麓群峯綰烟鬟炯炯皆在目寒碧冷相射秀氣還可掬哦詩三伏中清風起幽谷只恐吹我衣化爲雲錦服汗流籍湜輩上下相追逐右競秀軒仙家日月遲春物長芳菲欲擷瓊瑶英咀嚼雲𦚤肥只恐花霧深香氣濕我衣坐哦心未愜歸夣遶岩扉右擷芳軒上清之章口擷芳長引入騫林暁誦黄庭經暮歌紫芝曲若欲童子顔軒中勤練玉羽衣絡霞青雲鬢頽鬒緑功用信如許庻可追妙躅右練玉軒紫微夫人之歌曰慶雲𦆑丹爐練玉飛八瓊門外無俗駕眼中有餘清上登嶤嶤闕八䆫皆虚明三光煥爾照萬象無隱情試觀弄丹筆雲篆俱天成右煥照室黃庭經曰三光煥照入子室升巍躡層巔雲陛近百尺平生塵土足到此還幾歴有岩中枵然斧鑿若天劃玉泉出石罅雨點散寒碧我來供茗事松鼎煑瓊液餘甘生齒頰可以醒醉魄永懷鶴髪翁謂周景復嘗居于此四顧但空壁似聞便仙去山間謾留舄右仙水洞好山如故人欣然見眉宇又如梳暁鬟紅緑相媚嫵况兹愛山者握筆喜臨賦有岩巉然開欲陟縱蹇步清游亦不惡勝境得飽飫掃石坐晚凉濃翠濕冠屨好花續春遲紛紛雜紅霧仙家在何許恐入桃源誤竟為彌日留直待山月吐謾尋流水歸不記來時路右忘歸洞山嵐鬰蒼蒼溪水流浩浩紛然世上人換易如秋草竒哉三洞天連路極深窈陽崖射朝曦先見扶桑暁誰能餐九華颜色端使好仙翁蟬蛻去遺迹不可考我來愜登臨幽事費尋討悲嘯聞澗猿啁哳聽啼鳥平生憤懣憶到此始一掃行將袖手版汗漫游八表右𥘉暘谷又名倪翁洞兹山何巍巍欲上捫蘿蔦怪石虎踞蹲老卉虬天矯中有古洞天然若天造爰從開闢來日月自昏暁神龍此蟄蟠雷玉吐淼淼毎逢歳旱乾山老必見禱顧盻層雲生撖舞百川倒何時謝魚蝦昻雷騰浩渺右龍泓洞今名贊龍洞群守劉参古帝此登仙霓旌不復還孤票蒼嶺外屹立紫煙間上下形端柱周廻影𨍭環根疑連海嶠頂欲突天𨵈蓮出湖心逈苔漫轍迹斑傍存鍊丹𨥏低瞰歩虚山猿狖何能到鸞凰自可攀晝矜名手𦕈吟怯鉅題艱鴈蕩非靈異蘭岩鄙宴閑縉雲遊覽處勝㮣申人寰邑簿校書郎毛維瞻峭㧞神仙宅來尋煙水重深應盤九地髙不讓群峯瞻對竒勝晝捫縁直豈容幾時蓮葉下终古鮮紋封徃事雲難問無言路有蹤橋山杳何處侍從此攀龍轉運使蘇舜元求翁龍車鳳輦入笑轍迹髙懸不可攀唯有風吹鼎湖永青蓮花葉落人間兩浙察訪使吳興沈括存中苔封輦路上青山鶴馭遼天去不還惟有銀河秋月夜鼎湖煙浪到人間邑人國子洞業胡份子文鳥道盤空上松根抱石生羽人分兩舍雞犬自聞聲兩浙提刑濡須楊傑次公三首有路入仙都何人到鼎湖秋風夜來急吹落碧蓮無問路從黄碧穿雲入紫清林間松化石門外玉爲城道士非愛山出家今已老雖知車轍跡不識龍髯草郡守劉涇巨濟石城雲屋抱浮丘正是真人舊括州會𤣀仙圖爭少勝不知身到洞天遊津陽五銍題黃帝祠身大觀我渡溪水尋荒村群峯勢若萬馬奔酣酣春色雷初霽靄靄野氣山猶昏瓊樓金闕滌地盡松栢半帶斤斧痕要還清淨掃塵獨一炬刼火安得焚行人鞠翠馬拜仙都妙理吾能言威神可畏凛如在自臺今亦祠軒轅當年垂衣正南面制作取盤乾與坤鑿開鴻濛肇人紀首為區宇立本根風后方牧來聮翩神機開闢施無拫初傳問道廣成子後乃宻契中皇君功髙德大不可擬幾與造物分遺恩遥遥唐堯逮炎運萬年聖子兼神孫至人御世用常道飛升輕舉安足論爰從一氣生萬物奈何已把天人分伏義八封晝已破女媧欲補理亦繁飄然獨返清都去却歛造化歸全渾廟前仙石表今古屹立霄壤爭雄尊鼎湖可望不可見意令後世雞攀援頂中玄宫號泥丸自然有路朝天閽此身内外神氣合俯仰自超生死門黙運四時無詭異試觀日月誰吐吞祗今湖邊送風雨草木吹動旗與旙飄落十丈紅菡蓞碧溪下挿玻璃盆馬蹄車轍不須有雖迷襄野道自存岩泉夜發百谷響洞庭樂聲猶可聞山川古色藏妙意誰與開滌明根源我談希夷返淳朴不假辯說波濤翻郡人湖北提舉胡升子上鼎湖不可見巍然但孤峯特立亘萬古氣壓諸山雄黄帝久得仙游行跨飛龍至今世俗傳尚指輦路通頗如昇天檜追求白鹿蹤常言貴荒唐厥見真兒童顧惟此山竒實宜仙所宫水聲來泠風和以萬本松客枕久未穩笙簫滿虚空頗疑九成音不在二典中但恐蚩尤旗曄曄舒長虹雖能獨不死忍視斯民窮君看涿鹿戰萬古䝉其功鼎湖何足道帝德彌蒼穹通判延陵丁宗旦紹興世上洞天三十六縉雲第二十九區古木參天架雲屋緫真靈迹號仙都獨峯壁立二千尺凌空聳翠屹然孤仰瞻絶頂煙嵐際曽開菡蓞名鼎湖舊說軒轅駐車轍雲駢風馭經此淦石釜鍊竈丹砂就乗龍帝𡖖纔須臾紫虚碧落超塵世侍臣無路攀龍鬚唐朝天子仙李裔德格天心來瑞符祥煙嘉氣𡖖雲布山中九傅萬𡻕呼步虚對峙雲斷續東西互雲髙下殊澗邊幽徑登鳥道上有鏡岩如方壷岩中乳水瀝嵌罅滴石成穴如仰盂水一晝夜斛加半潦不泛溢旱不枯魯望曽記周景復絶粒餐霞黄老徒棲真妙入懸珠會八十餘年隠此居千古寥寥桑海變仙跡渺邈還有無石門瀑布雖云好此間殊勝未易俱特然造化鐘神秀虎頭妙手亦難圖事跡岀於圖经古詩郎中錢塘吳說傳明佳住從來說鼎湖兹遊直欲到清都參天玉筍千尋許墮地金蓮十丈無江觀便思眠一柱海山今喜識方壷直須買取鵝城絹要畫滄洲水墨圖上饒韓元吉南澗先生三首同檻外風髙霜月明歩虚山裏歩虚聲罷琴刻燭初長夜又得人間一夣清封禪空餘不死名華清宫裏望長生閑雲布作人間瑞更有山呼萬歳聲龍虎驅馳戰阪泉荆山鼎就更昇天軒轅到處存遺跡忍使君王不學仙運使李士舉道出仙都下溪深草木閑隂晴老農事豐稔此心關誰削千尋石雲藏萬疊山王程元有限那得更躋攀四海無塵戰馬閑稻梁桑柘緑回環不知盡是君王力華屋重重對好山已上過仙都徐氏山居见舊栝蒼續集今郡忠云文公作韻也郡守陽夏謝伋景惠和盪節光華逺軺車那得閑咨詢元自急省歛亦相關去住存髙詠晴隂對好山深慙糜郡𥿈仙境不同攀耄倪扶杖小童閑遶舍清溪碧水環爭看赤帷仍避傳靜無桴鼔愛青山浙東提舉朱熹晦庵先生追和徐氏山居韻岀岫孤雲意自閑不妨王事似連環解鞍盤礴忘歸去碧澗修筠似故山郡人吳謹微遊仙都五首薄䆠驅人畏簡書金柔暑濁倦征途歸來有意尋真境路入仙都不憚迂轍跡峯前聊息跡忘歸洞口未能歸往來名利憧憧者著脚仙都亦自稀黄冠道士老而癯相對談玄一事無勸我莫教沉宦海人間亦自有仙都石筍古傳八百丈鼎湖仙去幾千年我疑二事無從政但信仙都是洞天山下霏微雨洒塵門前嘹唳鶴迎人遂成一覺仙都夣更訪遺蹤得隠真郡守許尹覺民和紹興仙都蹤跡想遺書我欲歸時更問途忽得新詩如見畫山蹊野徑不須迂山中鶴怨無尋處洞口雲歸未得歸憶著仙都舊時路石梁苔澁履痕稀玉貌仙人老不癯世間榮辱此中無煙雲昨夜微銷鑠似怪題輿車騎都黄帝得仙從此去鼎湖傳説幾經年龍髯地成春草直到如今不上天桃源歸路淨無塵只是當時避世人仙事茫茫類如此鼎湖轍跡恐非真郡守呉芾追和來訪仙都古玉虚山前有客指迷途煙霞渺渺孤峯絶松竹森森一逕迂䇿杖行行入翠微步虚山下久忘歸幽棲宜有林中士何事斯人近世稀聞道山巔有鼎湖蓮花還似舊時無軒轅去後空車轍疑此山川即舊都人已乗龍去不還尚餘雙鶴不知年坐來頓覺塵寰隔始信壷中别有天登覽兹山古到今流傳今有幾何人如君聖踐懸知少况有新詩爲寫真仙都志卷下
