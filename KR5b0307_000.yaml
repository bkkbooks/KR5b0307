body:
  text: 仙都志序鞠四疆理之書肇於禹貢而具於職方然水有經郡邑有乘此仙都志所由作也仙都東吳勝事在道家書為祈仙洞天爰自發迹軒轅由唐建宋錫名薦祉符瑞屢臻聖朝延祐間貞士趙虛一載奉璽書來領事山川草木昭被寵光獨峰鍊溪若增而髙浚而深也住山陳君此一載筆于編沿革瑰竒巨細畢録其有功兹山者歟吾聞蓬萊在望而風輒弘去桃源既入而路忽迷則名山大川豈人人之所能周覽哉此編目擊道存可以卧遊矣至正戊子五月既望
